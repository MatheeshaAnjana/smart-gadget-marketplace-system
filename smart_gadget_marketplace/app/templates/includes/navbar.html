<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="{{ url_for('user.home') }}" class="nav-logo">
      <div class="logo-mark">
        <div class="logo-bar-tall"></div>
        <div class="logo-bar-short"></div>
      </div>
      <div class="logo-text-wrap">
        Smart<strong>Gadget</strong><div class="logo-superscript"></div>
      </div>
    </a>

    <ul class="nav-links" id="navLinks">
      <li><a href="{{ url_for('user.home') }}" class="nav-link {% if request.endpoint == 'user.home' %}active{% endif %}"><i class="fas fa-home"></i> Home</a></li>
      <li><a href="{{ url_for('user.products') }}" class="nav-link {% if request.endpoint == 'user.products' %}active{% endif %}"><i class="fas fa-th-large"></i> Products</a></li>
      <li><a href="{{ url_for('user.wishlist') }}" class="nav-link {% if request.endpoint == 'user.wishlist' %}active{% endif %}"><i class="fas fa-heart"></i> Wishlist</a></li>
      <li><a href="{{ url_for('user.orders') }}" class="nav-link {% if request.endpoint == 'user.orders' %}active{% endif %}"><i class="fas fa-box"></i> Orders</a></li>
      <li><a href="{{ url_for('user.ratings') }}" class="nav-link {% if request.endpoint == 'user.ratings' %}active{% endif %}"><i class="fas fa-star"></i> Ratings</a></li>
    </ul>

    <div class="nav-actions">
      <!-- Search bar -->
      <form action="{{ url_for('user.products') }}" method="GET" class="nav-search" id="navSearchForm">
        <input type="text" name="q" id="navSearch"
               placeholder="Search gadgets..." autocomplete="off"
               value="{{ request.args.get('q', '') }}"/>
        <button type="submit" title="Search"><i class="fas fa-search"></i></button>
        <div class="search-results" id="searchResults"></div>
      </form>

      <!-- Notifications -->
      <button class="notif-btn" onclick="toggleNotifications()" title="Notifications">
        <i class="fas fa-bell"></i>
        <span class="badge" id="notifBadge">3</span>
      </button>

      <!-- Cart -->
      <a href="{{ url_for('user.cart') }}" class="cart-btn" title="Shopping Cart">
        <i class="fas fa-shopping-cart"></i>
        <span class="badge" id="cartCount">0</span>
      </a>

      <!-- Profile -->
      <a href="{{ url_for('user.profile') }}" class="profile-btn" title="{{ session.get('user_name', 'Profile') }}">
        <img src="https://ui-avatars.com/api/?name={{ session.get('user_name', 'U')|urlencode }}&size=36&background=0ea5e9&color=fff"
             alt="{{ session.get('user_name', 'User') }}"/>
      </a>

      <!-- Logout -->
      <a href="{{ url_for('auth.logout') }}" class="nav-logout" title="Logout">
        <i class="fas fa-sign-out-alt"></i>
      </a>
    </div>

    <button class="hamburger" id="hamburger" title="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- Notification dropdown -->
  <div class="notification-panel" id="notifPanel">
    <div class="notif-header">
      <h4>Notifications</h4>
      <button onclick="clearNotifications()">Clear all</button>
    </div>
    <div class="notif-list">
      <div class="notif-item unread">
        <i class="fas fa-box notif-icon delivery"></i>
        <div><p>Your recent order is being processed!</p><span>Just now</span></div>
      </div>
      <div class="notif-item unread">
        <i class="fas fa-tag notif-icon sale"></i>
        <div><p>Flash sale! 30% off on Sony headphones</p><span>1 hr ago</span></div>
      </div>
      <div class="notif-item">
        <i class="fas fa-star notif-icon review"></i>
        <div><p>New products added to your category</p><span>3 hr ago</span></div>
      </div>
    </div>
    <div style="padding:10px;text-align:center;border-top:1px solid rgba(14,165,233,0.1);">
      <a href="{{ url_for('user.orders') }}" style="font-size:0.82rem;color:#0ea5e9;font-weight:600;">View all orders</a>
    </div>
  </div>
</nav>

<script>
/* Dynamic Island scroll effect */
(function () {
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', function () {
    if (window.scrollY > 20) {
      navbar.classList.add('scrolled');
    } else {
      navbar.classList.remove('scrolled');
    }
  }, { passive: true });
})();
</script>
