<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Smart Gadget Marketplace{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/marketplace.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}"/>
  {% block extra_css %}{% endblock %}

  <style>
    /* ===== Global liquid glass body ambient orbs ===== */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      filter: blur(60px);
      opacity: 0.5;
    }
    body::before {
      width: 600px; height: 600px;
      top: -150px; left: -150px;
      background: radial-gradient(circle, rgba(14,165,233,0.15) 0%, transparent 70%);
      animation: orbFloat 12s ease-in-out infinite;
    }
    body::after {
      width: 500px; height: 500px;
      bottom: -100px; right: -100px;
      background: radial-gradient(circle, rgba(56,189,248,0.12) 0%, transparent 70%);
      animation: orbFloat 15s ease-in-out infinite reverse;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(40px, 20px) scale(1.05); }
      66%       { transform: translate(-20px, 40px) scale(0.97); }
    }

    /* Fixed navbar means non-hero pages need top padding so content isn't hidden behind the pill.
       Pages that START with a hero section (full-viewport) manage their own offset via padding-top on .slide. */
    .main-content {
      /* Default: offset for fixed navbar so content on non-hero pages isn't hidden */
      padding-top: var(--navbar-height);
    }
    /* When the first child is the hero section, it handles its own top spacing */
    .main-content > .hero-section:first-child ~ * {
      /* siblings after hero need no extra offset */
    }
    /* Hero section itself needs NO top padding from main — it fills from 0 */
    .main-content:has(> .hero-section:first-child) {
      padding-top: 0;
    }
  </style>
</head>
<body>
  {% include 'includes/navbar.html' %}
  {% include 'includes/alerts.html' %}

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include 'includes/footer.html' %}

  <!-- Back to Top -->
  <button class="back-to-top" id="backToTop" title="Back to top">
    <i class="fas fa-arrow-up"></i>
  </button>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
